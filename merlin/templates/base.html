<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!-- Boostrap CSS -->
        <link rel="stylesheet"
              href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
              integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
              crossorigin="anonymous">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style type="text/css">
            .navbar {
                min-height: 100px;
                font-size: 25px;
            }
            .navbar-brand {
                font-size: 25px;
            }
            .grid-container {
                display: grid;
                grid-template-columns: auto auto auto auto auto auto auto;
                padding: 10px;
            }
            .grid-container div {
                border-bottom: 2px solid black;
                border-right: 2px solid black;
                padding: 10px;
                text-align: left;
            }
        </style>
        <title>TenMinMerlin Home</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-sm navbar-dark bg-dark sticky-tap">
            <a class="havbar-brand" href="/">Ten Minute Merlin</a>
            <button class="navbar-toggler"
                    type="button"
                    data-toggle="collapse"
                    data-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent"
                    aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mr-auto">
                    <li class="navbar-item active">
                        <a class="nav-link" href="/birds/events/">Events <span class="sr-only"></span></a>
                    </li>
                    <li class="navbar-item active">
                        <a class="nav-link" href="/birds/orders/">Orders <span class="sr-only">(current)</span></a>
                    </li>
                    <li class="navbar-item active">
                        <a class="nav-link" href="/birds/locations/">Locations <span class="sr-only"></span></a>
                    </li>
                    <li class="navbar-item active">
                        <a class="nav-link" href="/birds/all-birds/">All birds <span class="sr-only"></span></a>
                    </li>
                    <li class="hav-item">
                        <a class="nav-link" href="#">Logout</a>
                    </li>
                </ul>
                <form class="form-inline my-2 my-lg-0">
                    <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
                </form>
            </div>
        </nav>
        {% block content %}
            <h1>Welcome to Ten Minute Merlin!</h1>
        {% endblock %}
        <!-- Copyright in the footer -->
        <footer class="page-footer font-small blue">
            <hr>
            <div class="footer-copyright text-right py-3">2026 Copyright: Craig Amundsen</div>
        </footer>
    </body>
</html>
